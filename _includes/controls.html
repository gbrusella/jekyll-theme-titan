<details class="titan-panel">
  <summary title="Background settings" aria-label="Background settings">&#9881;</summary>
  <div class="titan-panel-body">
    <label>Model
      <select data-titan-shape>
        <optgroup label="2D plates">
          <option value="voronoi">Voronoi</option>
          <option value="triangles">Delaunay triangles</option>
          <option value="overlay">Delaunay + Voronoi</option>
          <option value="hexagons">Hexagons</option>
          <option value="squares">Squares</option>
          <option value="rhombille">Rhombille</option>
        </optgroup>
        <optgroup label="3D lattices">
          <option value="hcp">Hexagonal close-packed</option>
          <option value="fcc">Face-centred cubic</option>
          <option value="bcc">Body-centred cubic</option>
          <option value="cubic">Simple cubic</option>
        </optgroup>
      </select>
    </label>
    <label class="titan-motion-row">Motion
      <select data-titan-motion>
        <option value="sheet">Floating sheet</option>
        <option value="bulge">Travelling bulge</option>
      </select>
    </label>
    <label>Cell size <output data-titan-cell-value></output>
      <input type="range" min="34" max="140" step="2" data-titan-cell>
    </label>
    <button type="button" data-titan-reset>Reset to defaults</button>
  </div>
</details>
